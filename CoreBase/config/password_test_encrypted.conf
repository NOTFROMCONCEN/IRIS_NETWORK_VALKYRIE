# ============================================================
# 密码配置文件示例
# Password Configuration File Example
# ============================================================
#
# 使用说明:
#   1. 复制此文件为 password.conf: copy password_example.conf password.conf
#   2. 填入真实的用户名和密码
#   3. 建议使用加密格式存储密码（见下方说明）
#
# 格式: 厂商=用户名,密码
#   - 每行一个厂商的凭证
#   - 以 # 开头的行为注释
#   - 厂商关键字: huawei, h3c, ruijie, maipu, wst, cisco
#
# ============================================================
# 明文格式（不推荐）
# ============================================================
# huawei=admin,Huawei@123
# h3c=admin,H3c@123
#
# ============================================================
# 加密格式（推荐）
# ============================================================
# 加密后的密码以 ENC: 开头，例如:
# huawei=admin,ENC:gAAAAABl...
#
# 生成加密密码的方法:
#   1. 安装依赖: pip install cryptography
#   2. 运行加密工具: python scripts/encrypt_password.py
#   3. 查看输出文件 config/password_encrypted.conf
#   4. 验证后替换原文件
#
# ============================================================
# 示例（请替换为真实凭证）
# ============================================================

# 华为设备
huawei=admin,ENC:请使用加密工具生成

# H3C设备
h3c=admin,ENC:请使用加密工具生成

# 锐捷设备
ruijie=admin,ENC:请使用加密工具生成

# 迈普设备
maipu=admin,ENC:请使用加密工具生成

# 龙马防火墙
wst=admin,ENC:请使用加密工具生成

# 思科设备
cisco=admin,ENC:请使用加密工具生成

# ============================================================
# 网络设备巡检工具 - 主配置文件
# Network Device Inspection Tool - Main Configuration
# ============================================================

# 版本信息
version: "3.0.0"              # 程序版本号
description: "简化优化版本"    # 版本描述
release_date: '2025-10-15'     # 发布日期

# ============================================================
# 系统配置 (System Configuration)
# ============================================================
system:
  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: INFO
  
  # 默认重试次数（连接失败或命令执行失败时）
  retries: 3
  
  # 默认超时时间（秒）
  timeout: 120
  
  # 设备预检查最大并发数（用于快速检测设备可达性）
  max_workers_precheck: 20
  
  # 批量巡检最大并发数（实际执行巡检时的并发数）
  max_workers_batch: 5
  
  # 低功耗模式（启用后会降低并发数以减少资源占用）
  low_power_mode: false
  
  # 磁盘空间检查阈值（MB），低于此值时发出警告
  disk_space_check_mb: 100
  
  # ============================================================
  # 认证配置 (Authentication Configuration)
  # ============================================================
  
  # 密码错误立即断开（适用于dot1x等严苛的准入机制）
  # true: 密码错误时立即断开连接，不进行重试
  # false: 密码错误时按retries配置进行重试
  password_error_disconnect: true

# ============================================================
# 网络配置 (Network Configuration)
# ============================================================
network:
  # SSH默认端口
  ssh_port: 22
  
  # 连接超时时间（秒）
  connect_timeout: 60
  
  # 命令执行超时时间（秒）
  command_timeout: 120

# ============================================================
# 输出配置 (Output Configuration)
# ============================================================
output:
  # 日志文件存储目录
  logs_dir: output/logs
  
  # 巡检结果存储目录
  results_dir: output/results
  
  # 日志轮转配置
  log_rotation:
    # 是否启用日志轮转
    enabled: true
    
    # 单个日志文件最大大小（字节），10MB = 10485760
    max_bytes: 10485760
    
    # 保留的日志文件备份数量
    backup_count: 7
    
    # 是否压缩旧日志文件
    compress_old_logs: true

# ============================================================
# 功能开关 (Feature Flags)
# ============================================================
features:
  # 自动重试（连接或命令失败时自动重试）
  auto_retry: true
  
  # 日志收集模式（启用后只执行日志相关命令）
  log_mode: true
  
  # 进度条显示（在终端显示巡检进度）
  progress_bar: true
